<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kişisel Günlüğüm</title>
    <!-- Tailwind CSS ve Google Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>
    <style>
        /* İnce kaydırma çubuğu */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 99px; }
        ::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans h-screen flex flex-col md:flex-row overflow-hidden">

    <!-- MOBİL MENÜ BAR (TELEFONLARDA GÖRÜNÜR) -->
    <div class="md:hidden bg-white border-b border-slate-200 p-4 flex items-center justify-between z-10">
        <div class="flex items-center gap-2">
            <i data-lucide="book-open" class="text-indigo-600 w-5 h-5"></i>
            <span class="font-bold text-slate-900">Günlüğüm</span>
        </div>
        <button onclick="toggleSidebar()" class="p-2 hover:bg-slate-100 rounded-lg">
            <i data-lucide="menu" class="w-5 h-5"></i>
        </button>
    </div>

    <!-- SOL PANEL: YAZILAR -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-30 w-80 bg-white border-r border-slate-200 flex flex-col h-full transform -translate-x-full md:relative md:translate-x-0 transition-transform duration-300 ease-in-out flex-shrink-0">
        <!-- Başlık Bölümü -->
        <div class="p-6 border-b border-slate-100 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <i data-lucide="pencil-line" class="text-indigo-600 w-5 h-5"></i>
                <h1 class="text-lg font-bold text-slate-900 tracking-tight">Anılarım</h1>
            </div>
            <div class="flex items-center gap-1">
                <button onclick="startNewEntry()" class="p-2 bg-indigo-50 hover:bg-indigo-100 text-indigo-600 rounded-lg transition-colors" title="Yeni Yazı">
                    <i data-lucide="plus" class="w-4 h-4"></i>
                </button>
                <button onclick="toggleSidebar()" class="md:hidden p-2 hover:bg-slate-100 text-slate-500 rounded-lg">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>
            </div>
        </div>

        <!-- Arama Çubuğu -->
        <div class="p-4 border-b border-slate-100">
            <div class="relative">
                <i data-lucide="search" class="absolute left-3 top-2.5 text-slate-400 w-4 h-4"></i>
                <input id="searchInput" type="text" oninput="renderEntries()" placeholder="Yazılarda ara..." class="w-full pl-9 pr-4 py-2 border border-slate-200 rounded-lg text-xs focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all">
            </div>
        </div>

        <!-- Yazı Listesi -->
        <div id="entriesList" class="flex-1 overflow-y-auto divide-y divide-slate-100">
            <!-- JavaScript ile dolacak -->
        </div>

        <!-- Yedekleme ve Alt Kısım -->
        <div class="p-4 border-t border-slate-100 bg-slate-50 flex justify-between text-xs text-slate-500">
            <button onclick="exportData()" class="flex items-center gap-1 hover:text-slate-800 transition-colors">
                <i data-lucide="download" class="w-3.5 h-3.5"></i> Bilgisayara Yedekle
            </button>
            <label class="flex items-center gap-1 hover:text-slate-800 cursor-pointer transition-colors">
                <i data-lucide="upload" class="w-3.5 h-3.5"></i> Yedeği Geri Yükle
                <input type="file" id="importFile" class="hidden" accept=".json" onchange="importData(event)">
            </label>
        </div>
    </aside>

    <!-- SAĞ PANEL: OKUMA VE YAZMA ALANI -->
    <main class="flex-1 bg-slate-50 flex flex-col h-full overflow-hidden relative">

        <!-- HOŞ GELDİNİZ EKRANI -->
        <div id="welcomeState" class="flex-1 flex flex-col items-center justify-center p-8 text-center">
            <div class="w-16 h-16 bg-white shadow-sm rounded-2xl flex items-center justify-center mb-4 border border-slate-100">
                <i data-lucide="book-marked" class="text-indigo-500 w-8 h-8"></i>
            </div>
            <h2 class="text-lg font-semibold text-slate-800">Düşüncelerinizi Kaleme Alın</h2>
            <p class="text-sm text-slate-500 mt-1 max-w-sm">Yazılarınız doğrudan bilgisayarınıza kaydedilir, internete yüklenmez. Güvenle yazabilirsiniz.</p>
            <button onclick="startNewEntry()" class="mt-4 px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-semibold rounded-lg shadow-sm transition-all">Yeni Yazı Oluştur</button>
        </div>

        <!-- OKUMA MODU (YAZININ FULL GÖRÜNECEĞİ YER) -->
        <div id="viewState" class="hidden flex-1 overflow-y-auto p-6 md:p-12 flex justify-center">
            <div class="max-w-2xl w-full flex flex-col h-full">
                <!-- Üst Kontroller -->
                <div class="flex items-center justify-between mb-8 pb-4 border-b border-slate-200/60">
                    <div class="flex flex-col gap-1.5">
                        <div class="flex items-center gap-2 flex-wrap">
                            <span id="viewMood" class="text-xs font-semibold bg-indigo-50 text-indigo-700 px-2.5 py-0.5 rounded-md"></span>
                            <span id="viewDate" class="text-xs text-slate-400"></span>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="startEdit()" class="p-2 text-slate-500 hover:text-indigo-600 hover:bg-slate-100 rounded-lg transition-all" title="Düzenle">
                            <i data-lucide="edit-3" class="w-4 h-4"></i>
                        </button>
                        <button onclick="deleteActiveEntry()" class="p-2 text-slate-500 hover:text-red-600 hover:bg-slate-100 rounded-lg transition-all" title="Sil">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
                <!-- Yazı Detayı -->
                <article class="flex-1 pb-16">
                    <h1 id="viewTitle" class="text-3xl md:text-4xl font-extrabold text-slate-900 tracking-tight mb-6 leading-tight"></h1>
                    <div id="viewContent" class="font-serif text-lg md:text-xl leading-relaxed text-slate-700 whitespace-pre-wrap break-words"></div>
                </article>
            </div>
        </div>

        <!-- YAZMA / DÜZENLEME MODU -->
        <div id="editState" class="hidden flex-1 overflow-y-auto p-6 md:p-12 flex justify-center bg-white">
            <div class="max-w-2xl w-full flex flex-col">
                <div class="flex items-center justify-between mb-8 pb-4 border-b border-slate-100">
                    <h2 id="formStateTitle" class="text-lg font-bold text-slate-900">Günlüğü Kaleme Al</h2>
                    <div class="flex gap-3">
                        <button onclick="cancelEdit()" class="px-3 py-1.5 border border-slate-200 hover:bg-slate-50 text-slate-600 rounded-lg text-xs font-medium transition-all">İptal</button>
                        <button onclick="saveEntry()" class="px-3 py-1.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-xs font-medium transition-all shadow-sm">Kaydet</button>
                    </div>
                </div>

                <div class="space-y-6 flex-1 flex flex-col">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-semibold uppercase tracking-wider text-slate-400 mb-1">Tarih</label>
                            <input id="inputDate" type="date" class="w-full px-3 py-1.5 border border-slate-200 rounded-lg text-xs">
                        </div>
                        <div>
                            <label class="block text-[10px] font-semibold uppercase tracking-wider text-slate-400 mb-1">Modunuz</label>
                            <select id="inputMood" class="w-full px-3 py-1.5 border border-slate-200 rounded-lg text-xs">
                                <option value="Sakin">Sakin 🧘‍♂️</option>
                                <option value="Mutlu">Mutlu 😊</option>
                                <option value="Harika">Harika 🥳</option>
                                <option value="Yorgun">Yorgun 😴</option>
                                <option value="Düşünceli">Düşünceli 🤔</option>
                                <option value="Hüzünlü">Hüzünlü 😢</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <input id="inputTitle" type="text" placeholder="Günün Başlığı..." class="w-full text-xl font-bold border-none border-b border-transparent hover:border-slate-100 focus:border-indigo-500 focus:outline-none py-2 text-slate-900 placeholder-slate-300">
                    </div>

                    <div class="flex-1 flex flex-col">
                        <textarea id="inputContent" placeholder="Neler yaşadınız? Paragraf sınırı olmadan, dilediğiniz uzunlukta yazabilirsiniz..." class="w-full flex-1 min-h-[300px] border-none focus:outline-none resize-none font-serif text-lg leading-relaxed text-slate-700 placeholder-slate-300"></textarea>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script>
        // Bilgisayara kaydetmek için LocalStorage kullanıyoruz [1]
        let entries = JSON.parse(localStorage.getItem('my_perfect_local_diary')) || [];
        let activeEntryId = null;

        // Eğer hiç yazı yoksa örnek bir yazı oluşturulur
        if (entries.length === 0) {
            entries = [{
                id: 'welcome-entry',
                title: 'Günlüğüme Hoş Geldiniz ✍️',
                content: 'Bu günlük tamamen sizin bilgisayarınıza özeldir. Yazdığınız tüm anılar tarayıcınızın hafızasında saklanır.\n\nYeni bir yazı oluşturmak için sol üstteki "+" butonuna basabilirsiniz. İstediğiniz kadar uzun yazabilirsiniz, herhangi bir sınır yoktur.',
                date: new Date().toISOString().split('T')[0],
                mood: 'Sakin'
            }];
            localStorage.setItem('my_perfect_local_diary', JSON.stringify(entries));
        }

        window.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            renderEntries();
        });

        // Yazıları Menüde Listeleme
        function renderEntries() {
            const listContainer = document.getElementById('entriesList');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            listContainer.innerHTML = '';

            const filtered = entries.filter(entry => 
                ((entry.title || '').toLowerCase().includes(searchTerm) || (entry.content || '').toLowerCase().includes(searchTerm))
            ).sort((a, b) => new Date(b.date) - new Date(a.date));

            if (filtered.length === 0) {
                listContainer.innerHTML = `<div class="p-8 text-center text-slate-400 text-xs">Yazı bulunamadı.</div>`;
                return;
            }

            filtered.forEach(entry => {
                const isActive = entry.id === activeEntryId;
                const formattedDate = formatDateString(entry.date);
                const shortContent = entry.content ? entry.content.substring(0, 60) + '...' : '';

                const item = document.createElement('div');
                item.className = `p-4 cursor-pointer border-l-4 transition-all hover:bg-slate-50 ${
                    isActive ? 'border-indigo-600 bg-indigo-50/50 hover:bg-indigo-50/50' : 'border-transparent'
                }`;
                item.onclick = () => {
                    selectEntry(entry.id);
                    if (window.innerWidth < 768) toggleSidebar();
                };

                item.innerHTML = `
                    <div class="flex items-center justify-between mb-1">
                        <span class="text-[10px] text-slate-400 font-medium">${formattedDate}</span>
                        <span class="text-[10px] px-2 py-0.5 bg-slate-100 text-slate-600 rounded-full font-semibold">${entry.mood || 'Sakin'}</span>
                    </div>
                    <h3 class="font-semibold text-slate-900 text-xs mb-1 truncate">${entry.title || 'Başlıksız'}</h3>
                    <p class="text-[11px] text-slate-500 line-clamp-1">${shortContent}</p>
                `;
                listContainer.appendChild(item);
            });
            lucide.createIcons();
        }

        // Yazı Detayını Gösterme (FULL GÖRÜNÜM)
        function selectEntry(id, changeState = true) {
            activeEntryId = id;
            const entry = entries.find(e => e.id === id);
            if (!entry) return;

            if (changeState) {
                document.getElementById('welcomeState').classList.add('hidden');
                document.getElementById('editState').classList.add('hidden');
                document.getElementById('viewState').classList.remove('hidden');
            }

            document.getElementById('viewTitle').innerText = entry.title || 'Başlıksız';
            document.getElementById('viewContent').innerText = entry.content || '';
            document.getElementById('viewDate').innerText = formatDateString(entry.date);
            document.getElementById('viewMood').innerText = getMoodEmoji(entry.mood) + ' ' + (entry.mood || 'Sakin');

            renderEntries();
        }

        // Yeni Yazı Ekranı
        function startNewEntry() {
            activeEntryId = null;
            document.getElementById('welcomeState').classList.add('hidden');
            document.getElementById('viewState').classList.add('hidden');
            document.getElementById('editState').classList.remove('hidden');

            document.getElementById('formStateTitle').innerText = "Yeni Günlük Yazısı";
            document.getElementById('inputDate').value = new Date().toISOString().split('T')[0];
            document.getElementById('inputMood').value = "Sakin";
            document.getElementById('inputTitle').value = "";
            document.getElementById('inputContent').value = "";
            document.getElementById('inputTitle').focus();
        }

        // Düzenleme Ekranı
        function startEdit() {
            const entry = entries.find(e => e.id === activeEntryId);
            if (!entry) return;

            document.getElementById('viewState').classList.add('hidden');
            document.getElementById('editState').classList.remove('hidden');

            document.getElementById('formStateTitle').innerText = "Yazıyı Düzenle";
            document.getElementById('inputDate').value = entry.date;
            document.getElementById('inputMood').value = entry.mood || "Sakin";
            document.getElementById('inputTitle').value = entry.title;
            document.getElementById('inputContent').value = entry.content;
        }

        function cancelEdit() {
            if (activeEntryId) {
                selectEntry(activeEntryId);
            } else {
                document.getElementById('editState').classList.add('hidden');
                document.getElementById('welcomeState').classList.remove('hidden');
            }
        }

        // Kaydetme İşlemi (Yerel Hafızaya)
        function saveEntry() {
            const title = document.getElementById('inputTitle').value.trim() || 'Başlıksız';
            const content = document.getElementById('inputContent').value.trim();
            const date = document.getElementById('inputDate').value;
            const mood = document.getElementById('inputMood').value;

            if (!content) {
                alert("İçerik alanı boş bırakılamaz.");
                return;
            }

            if (activeEntryId) {
                const index = entries.findIndex(e => e.id === activeEntryId);
                if (index !== -1) {
                    entries[index] = { id: activeEntryId, title, content, date, mood };
                }
            } else {
                const newId = 'entry-' + Date.now();
                entries.push({ id: newId, title, content, date, mood });
                activeEntryId = newId;
            }

            localStorage.setItem('my_perfect_local_diary', JSON.stringify(entries));
            renderEntries();
            selectEntry(activeEntryId);
        }

        // Silme İşlemi
        function deleteActiveEntry() {
            if (!activeEntryId) return;

            if (confirm("Bu yazıyı kalıcı olarak silmek istediğinizden emin misiniz?")) {
                entries = entries.filter(e => e.id !== activeEntryId);
                activeEntryId = null;
                localStorage.setItem('my_perfect_local_diary', JSON.stringify(entries));
                renderEntries();
                document.getElementById('viewState').classList.add('hidden');
                document.getElementById('welcomeState').classList.remove('hidden');
            }
        }

        // Bilgisayara Dosya Olarak Yedekleme
        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(entries, null, 2));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", `gunluk_yedek_${new Date().toISOString().split('T')[0]}.json`);
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        }

        // Yedeği Geri Yükleme
        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (Array.isArray(imported)) {
                        if (confirm("Mevcut tüm günlüklerinizin silinip yedek dosyasının yüklenmesini onaylıyor musunuz?")) {
                            entries = imported;
                            localStorage.setItem('my_perfect_local_diary', JSON.stringify(entries));
                            renderEntries();
                            document.getElementById('viewState').classList.add('hidden');
                            document.getElementById('welcomeState').classList.remove('hidden');
                            alert("Yedek başarıyla yüklendi!");
                        }
                    } else {
                        alert("Geçersiz dosya formatı.");
                    }
                } catch (err) {
                    alert("Dosya okunurken bir hata oluştu.");
                }
            };
            reader.readAsText(file);
        }

        // Telefonlar İçin Menü Aç/Kapat
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
        }

        // Yardımcı Fonksiyonlar
        function formatDateString(dateStr) {
            if (!dateStr) return '';
            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' };
            return new Date(dateStr).toLocaleDateString('tr-TR', options);
        }

        function getMoodEmoji(mood) {
            const moods = { 'Sakin': '🧘‍♂️', 'Mutlu': '😊', 'Harika': '🥳', 'Yorgun': '😴', 'Düşünceli': '🤔', 'Hüzünlü': '😢' };
            return moods[mood] || '✍️';
        }
    </script>
</body>
</html>
